<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        input { padding: 8px; margin: 5px; width: 250px; }
    </style>
</head>
<body>
    <h1>Login System Test</h1>
    
    <h2>Test Login</h2>
    <div>
        <input type="email" id="testEmail" value="test@example.com" placeholder="Email">
        <input type="password" id="testPassword" value="test123" placeholder="Password">
        <button onclick="testLogin()">Test Login</button>
    </div>
    
    <h2>Test Login with Wrong Password</h2>
    <div>
        <input type="email" value="test@example.com" placeholder="Email" disabled>
        <input type="password" value="wrongpassword" placeholder="Wrong Password" disabled>
        <button onclick="testWrongLogin()">Test Wrong Password</button>
    </div>
    
    <div id="results"></div>
    
    <script>
        const API = "http://127.0.0.1:8000";
        
        function addResult(message, isSuccess) {
            const resultsDiv = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${isSuccess ? 'success' : 'error'}`;
            div.textContent = message;
            resultsDiv.appendChild(div);
        }
        
        async function testLogin() {
            const email = document.getElementById('testEmail').value;
            const password = document.getElementById('testPassword').value;
            
            try {
                const response = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    addResult(`✓ Login successful! Token: ${data.token}, User: ${data.user.name}`, true);
                    addResult(`✓ User data saved to localStorage`, true);
                } else {
                    addResult(`✗ Login failed: ${data.detail || data.message}`, false);
                }
            } catch (error) {
                addResult(`✗ Network error: ${error.message}`, false);
            }
        }
        
        async function testWrongLogin() {
            try {
                const response = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'test@example.com', password: 'wrongpassword' })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    addResult(`✓ Error handled correctly: ${data.detail}`, true);
                } else {
                    addResult(`✗ Expected error but got success`, false);
                }
            } catch (error) {
                addResult(`✗ Network error: ${error.message}`, false);
            }
        }
        
        // Run tests on page load
        window.onload = function() {
            addResult('Backend server is running: http://127.0.0.1:8000', true);
            addResult('Click the buttons above to test the login functionality', false);
        };
    </script>
</body>
</html>
