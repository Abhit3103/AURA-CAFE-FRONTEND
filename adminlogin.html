<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Admin Login</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            900: '#134e4a',
                        },
                        surface: '#ffffff',
                        background: '#f8fafc',
                    }
                }
            }
        }
    </script>
</head>
<script src="app.js"></script>
<script>
function handleAdminLogin(event) {
    event.preventDefault();

    const email = document.getElementById("adminEmail").value;
    const password = document.getElementById("adminPassword").value;
    const errorMsg = document.getElementById("adminLoginError");

    // Simple hardcoded check
    if (email === "admin@aura.com" && password === "adminaura123") {
        localStorage.setItem("admin", "true");

        // redirect to admin dashboard
        window.location.href = "admin.html"; // make sure name matches
    } else {
        errorMsg.classList.remove("hidden");
    }
}
</script>
<body class="bg-background text-slate-800 font-sans antialiased flex items-center justify-center min-h-screen p-4">

    <!-- Login Container -->
    <div class="login-card w-full max-w-md bg-surface p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 relative overflow-hidden">
        
        <!-- Logo Header -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-2 text-slate-900 font-bold text-3xl tracking-widest font-serif mb-2">
                <i class="ph ph-coffee text-4xl text-brand-600"></i>
                AURA
            </div>
            <h1 class="text-xl font-semibold text-slate-800 tracking-tight">Admin Login</h1>
            <p class="text-slate-500 text-sm mt-1">Sign in to access your dashboard</p>
        </div>

        <form id="adminLoginForm" onsubmit="handleAdminLogin(event)" class="space-y-5">
            <div>
                <label for="adminEmail" class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-brand-500 transition-colors">
                        <i class="ph ph-envelope text-lg"></i>
                    </div>
                    <input type="email" id="adminEmail" required value="admin@aura.com"
                        class="block w-full pl-10 pr-3 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition-all text-sm bg-slate-50 hover:bg-white focus:bg-white outline-none shadow-sm"
                        placeholder="Enter admin email">
                </div>
            </div>
            
            <div>
                <label for="adminPassword" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 group-focus-within:text-brand-500 transition-colors">
                        <i class="ph ph-lock-key text-lg"></i>
                    </div>
                    <input type="password" id="adminPassword" required
                        class="block w-full pl-10 pr-12 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-brand-500/10 focus:border-brand-500 transition-all text-sm bg-slate-50 hover:bg-white focus:bg-white outline-none shadow-sm"
                        placeholder="Enter admin password">
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-700 focus:outline-none transition-colors">
                        <i class="ph ph-eye text-lg" id="togglePasswordIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Error Message -->
            <div id="adminLoginError" class="hidden font-medium text-red-600 bg-red-50 py-2.5 px-3 rounded-xl border border-red-100 flex items-center gap-2 text-sm shadow-sm">
                <i class="ph ph-warning-circle text-lg"></i> <span>Invalid email or password</span>
            </div>

            <button type="submit" id="adminLoginBtn"
                class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-xl shadow-md shadow-brand-500/20 text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 focus:outline-none focus:ring-4 focus:ring-brand-500/30 transition-all duration-200 transform hover:-translate-y-0.5">
                Login <i class="ph ph-arrow-right"></i>
            </button>
        </form>
        
        <div class="mt-8 text-center text-xs text-slate-400 font-medium">
            Secure Admin Portal &copy; <script>document.write(new Date().getFullYear())</script> Aura Cafe
        </div>
    </div>

    <!-- Main application logic for the login -->
    <script src="app.js"></script>
</body>
</html>
